<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ACRLIC</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <aside class="auth-visual">
      <div class="auth-brand">
        <a href="index.html" class="logo"><span class="logo-mark">A</span> ACRLIC</a>
      </div>
      <div>
        <h2>Welcome back to the letter studio</h2>
        <p>Track orders, revise designs, and manage deliveries in one place.</p>
      </div>
      <p style="opacity:0.5; font-size:0.85rem; position:relative; z-index:1;">Precision acrylic · Design to delivery</p>
    </aside>

    <main class="auth-panel">
      <div class="auth-box">
        <h1>Sign in</h1>
        <p>Enter your account details to continue.</p>

        <div class="auth-alert" id="loginAlert">Signed in successfully. Redirecting…</div>

        <form id="loginForm">
			
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="enter email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" />
          </div>
          <label class="form-check">
            <input type="checkbox" name="remember" />
            Keep me signed in
          </label>
          <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <p class="form-footer">
          New here? <a href="register.html">Create an account</a>
        </p>
        <p class="form-footer" style="margin-top:0.5rem;">
          <a href="index.html">← Back to home</a>
        </p>
      </div>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
