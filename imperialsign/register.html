<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ACRLIC</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <aside class="auth-visual">
      <div class="auth-brand">
        <a href="index.html" class="logo"><span class="logo-mark">A</span> ACRLIC</a>
      </div>
      <div>
        <h2>Open your acrylic ordering account</h2>
        <p>Save designs, place letter orders, and follow production status live.</p>
      </div>
      <p style="opacity:0.5; font-size:0.85rem; position:relative; z-index:1;">Clients · Shops · Interior studios</p>
    </aside>

    <main class="auth-panel">
      <div class="auth-box">
        <h1>Create account</h1>
        <p>Set up your studio profile in under a minute.</p>

        <div class="auth-alert" id="registerAlert">Account created. Redirecting to login…</div>

        <form id="registerForm" method="post" action="http://localhost:81/imperialsign/register.php">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First name</label>
              <input type="text" id="firstName" name="firstName" placeholder="Alex" required />
            </div>
            <div class="form-group">
              <label for="lastName">Last name</label>
              <input type="text" id="lastName" name="lastName" placeholder="Rivera" required />
            </div>
          </div>
          <div class="form-group">
            <label for="company">Company / Studio</label>
            <input type="text" id="company" name="company" placeholder="Optional" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@studio.com" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="+1 555 0100" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6" />
            </div>
            <div class="form-group">
              <label for="confirm">Confirm</label>
              <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required minlength="6" />
            </div>
          </div>
          <label class="form-check">
            <input type="checkbox" name="terms" required />
            I agree to the studio terms for custom letter orders
          </label>
          <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <p class="form-footer">
          Already registered? <a href="login.html">Sign in</a>
        </p>
        <p class="form-footer" style="margin-top:0.5rem;">
          <a href="index.html">← Back to home</a>
        </p>
      </div>
    </main>
  </div>


</body>
</html>
